# 機票追蹤設定
# 想加新航線就在 routes 下面複製一段
#
# 欄位說明：
#   name          顯示用的名字 (任意字串)
#   origin        出發機場 IATA 代碼 (TPE = 桃園)
#   destination   目的機場 IATA 代碼 (BKK = 曼谷蘇凡納布)
#   depart_date   去程日期 YYYY-MM-DD
#   return_date   回程日期 (單程的話刪掉這行)
#   adults        人數
#   currency      幣別 (TWD = 新台幣)
#   non_stop      true = 只看直達
#   airline       航空公司 IATA 代碼 (JX = 星宇)；要看所有航空就把這行刪掉或註解掉
#   threshold     跌到這個價 (含稅總價) 以下就開「警報」issue (買!)
#   watch_threshold 跌到這個價以下開「留意」issue (沒到 threshold 那麼急) (可省略)

routes:
  # 主追蹤：所有航空直飛裡的最便宜
  - name: "TPE↔BKK 10/3-10/11 全航空"
    origin: TPE
    destination: BKK
    depart_date: "2026-10-03"
    return_date: "2026-10-11"
    adults: 1
    currency: TWD
    non_stop: true
    threshold: 11000          # 跌破就「警報」(BUY)
    watch_threshold: 12000    # 跌破就「留意」(heads up)

  # 同日期但只看星宇直飛 (JX 741/742 早班為主)
  # 目前約 $12,805；星宇本身比較少破萬，門檻設保守一點
  - name: "TPE↔BKK 10/3-10/11 星宇"
    origin: TPE
    destination: BKK
    depart_date: "2026-10-03"
    return_date: "2026-10-11"
    adults: 1
    currency: TWD
    non_stop: true
    airline: JX
    threshold: 11500          # 星宇跌到 11500 算撿到便宜
    watch_threshold: 12500    # 跌到 12500 先留意
